<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Rotina</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Rotina">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0e0f12">
<style>
  :root{ color-scheme:dark; --bg:#0e0f12; --panel:rgba(255,255,255,.05); --line:rgba(255,255,255,.1);
    --ink:#f1f1f2; --ink2:#a7a7ac; --ink3:#74757b; --ok:#9fe1cb; --err:#f0997b; --accent:#e9eef6; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{ background:linear-gradient(180deg,#212329,#15161a 40%,#0e0f12); color:var(--ink);
    font-family:-apple-system,"Segoe UI",system-ui,sans-serif; }
  #app{ display:flex; flex-direction:column; height:100vh; max-width:560px; margin:0 auto; }
  header{ padding:14px 18px calc(env(safe-area-inset-top) + 0px); padding-top:max(14px,env(safe-area-inset-top));
    display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--line); }
  header .logo{ width:26px; height:26px; border-radius:8px; }
  header h1{ font-size:17px; font-weight:600; margin:0; }
  header .dot{ margin-left:auto; font-size:11px; color:var(--ink3); display:flex; align-items:center; gap:6px; }
  header .dot i{ width:8px; height:8px; border-radius:50%; background:#666; display:inline-block; }
  header .dot.on i{ background:#56c08d; } header .dot.off i{ background:#d8703f; }
  main{ flex:1; overflow:hidden; position:relative; }
  .pane{ position:absolute; inset:0; overflow-y:auto; padding:16px 16px 16px; display:none; }
  .pane.show{ display:block; }
  .pane.flexcol{ display:none; flex-direction:column; }
  .pane.flexcol.show{ display:flex; }
  h2{ font-size:13px; font-weight:600; color:var(--ink2); text-transform:uppercase; letter-spacing:.08em; margin:4px 2px 12px; }

  /* nav */
  nav{ display:flex; border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom); background:rgba(14,15,18,.9); -webkit-backdrop-filter:blur(10px); }
  nav button{ flex:1; background:none; border:0; color:var(--ink3); font-family:inherit; font-size:11px; padding:9px 0 10px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; }
  nav button svg{ width:22px; height:22px; }
  nav button.active{ color:var(--ink); }

  /* cards/rows */
  .row{ display:flex; align-items:center; gap:12px; padding:13px 14px; border:1px solid var(--line); border-radius:12px; background:var(--panel); margin-bottom:9px; }
  .row .mid{ flex:1; min-width:0; }
  .row .t1{ font-size:15px; font-weight:500; }
  .row .t2{ font-size:12px; color:var(--ink2); margin-top:2px; word-break:break-word; }
  .time{ font-variant-numeric:tabular-nums; font-size:15px; font-weight:600; min-width:46px; }
  .x{ background:none; border:0; color:var(--ink3); font-size:20px; padding:4px 6px; cursor:pointer; }
  .x:active{ color:var(--err); }
  .sw{ width:42px; height:26px; border-radius:13px; background:rgba(255,255,255,.15); position:relative; border:0; cursor:pointer; flex:none; }
  .sw::after{ content:""; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left .15s; }
  .sw.on{ background:#56c08d; } .sw.on::after{ left:19px; }
  .muted{ color:var(--ink3); font-size:13px; text-align:center; padding:24px 10px; }

  /* inputs */
  input,textarea{ width:100%; padding:12px; border-radius:10px; border:1px solid var(--line); background:rgba(255,255,255,.05); color:var(--ink); font-size:15px; font-family:inherit; }
  textarea{ resize:none; }
  button.primary{ width:100%; border:0; border-radius:11px; padding:13px; font-size:15px; font-weight:600; font-family:inherit; background:var(--accent); color:#161618; cursor:pointer; margin-top:10px; }
  button.ghost{ width:100%; border:1px solid var(--line); border-radius:11px; padding:12px; font-size:14px; font-family:inherit; background:transparent; color:var(--ink); cursor:pointer; margin-top:10px; }
  .addbar{ display:flex; gap:8px; margin-bottom:14px; }
  .addbar input{ flex:1; } .addbar button{ flex:none; padding:0 16px; border:0; border-radius:10px; background:var(--accent); color:#161618; font-weight:600; font-family:inherit; font-size:14px; }
  .status{ font-size:13px; color:var(--ink2); min-height:18px; margin-top:10px; } .ok{color:var(--ok);} .err{color:var(--err);}
  .hint{ font-size:12px; color:var(--ink3); margin-top:10px; line-height:1.5; }
  .hide{ display:none; }

  /* chat */
  #chatList{ flex:1; overflow-y:auto; padding:6px 2px 4px; display:flex; flex-direction:column; gap:8px; }
  .msg{ max-width:84%; padding:10px 13px; border-radius:15px; font-size:15px; line-height:1.4; white-space:pre-wrap; word-break:break-word; }
  .msg.me{ align-self:flex-end; background:#2b2d33; border-bottom-right-radius:5px; }
  .msg.bot{ align-self:flex-start; background:var(--panel); border:1px solid var(--line); border-bottom-left-radius:5px; }
  .chatbar{ display:flex; gap:8px; padding-top:8px; }
  .chatbar textarea{ flex:1; height:44px; max-height:120px; }
  .chatbar button{ flex:none; width:44px; border:0; border-radius:11px; background:var(--accent); color:#161618; font-size:18px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <img class="logo" src="icon.png" alt="">
    <h1>Rotina</h1>
    <span id="dot" class="dot off"><i></i><span id="dotTxt">conectando…</span></span>
  </header>

  <main>
    <!-- CHAT -->
    <section id="pane-chat" class="pane flexcol show">
      <div id="chatList"></div>
      <div class="chatbar">
        <textarea id="chatTxt" placeholder="Fala comigo, lust… (ex.: lembra de pagar o boleto em 2 dias)"></textarea>
        <button id="chatSend" aria-label="Enviar">↑</button>
      </div>
    </section>

    <!-- ALARMES -->
    <section id="pane-alarmes" class="pane">
      <h2>Alarmes</h2>
      <div class="addbar">
        <input id="alHora" placeholder="08:00" inputmode="numeric" maxlength="5" style="flex:none;width:74px;text-align:center;">
        <input id="alTit" placeholder="Título do alarme">
        <button id="alAdd">+</button>
      </div>
      <div id="alList"><div class="muted">carregando…</div></div>
    </section>

    <!-- NOTAS -->
    <section id="pane-notas" class="pane">
      <h2>Anotações</h2>
      <div class="addbar">
        <input id="ntTxt" placeholder="Nova anotação…">
        <button id="ntAdd">+</button>
      </div>
      <div id="ntList"><div class="muted">carregando…</div></div>
    </section>

    <!-- CONFIG -->
    <section id="pane-config" class="pane">
      <h2>Notificações</h2>
      <p class="hint">Ative pra receber os alarmes neste aparelho (com seu ícone e os botões Feito / Soneca).</p>
      <button id="ativar" class="primary">Ativar notificações</button>
      <div id="codeWrap" class="hide">
        <input id="code" placeholder="cole seu código secreto" autocapitalize="off" autocorrect="off" spellcheck="false" style="margin-top:12px;">
        <button id="salvar" class="ghost">Salvar código</button>
      </div>
      <div id="status" class="status"></div>
      <div id="iosHint" class="hint hide">No iPhone: Compartilhar → "Adicionar à Tela de Início", abra por lá e ative.</div>
    </section>
  </main>

  <nav>
    <button data-tab="chat" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.5 8.5 0 0 1-12.3 7.6L3 21l1.9-5.7A8.5 8.5 0 1 1 21 11.5z"/></svg>Chat
    </button>
    <button data-tab="alarmes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2M5 3 2.5 5.5M19 3l2.5 2.5"/></svg>Alarmes
    </button>
    <button data-tab="notas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 4h8a2 2 0 0 1 2 2v14l-3-2-3 2-3-2-3 2V6a2 2 0 0 1 2-2z"/><path d="M9 8h6M9 12h6"/></svg>Notas
    </button>
    <button data-tab="config">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.3 1a7 7 0 0 0-1.7-1L16.5 2h-4l-.4 2.6a7 7 0 0 0-1.7 1l-2.3-1-2 3.4L5.1 11a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.4 2.6h4l.4-2.6a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.5a7 7 0 0 0 .1-1z"/></svg>Config
    </button>
  </nav>
</div>

<script>
  var VAPID_PUBLIC = "BCRiOAUbj1DeYMlrOVjC-KQTYAxMhtwwmhMGbjfjPbThB4JHggvj1cQANHkeGv2qIeCEdeFe6lCR8VZb4TNh4fs";
  var NTFY = "https://ntfy.sh";
  var $ = function(id){ return document.getElementById(id); };

  // ---- segredo ----
  function getSecret(){
    var m = location.hash.match(/k=([A-Za-z0-9_-]+)/);
    if (m) { localStorage.setItem('rotina_k', m[1]); return m[1]; }
    return localStorage.getItem('rotina_k');
  }
  var secret = getSecret();

  // ---- RPC sobre ntfy (PWA <-> PC) ----
  var pending = {}, es = null, online = false;
  function setDot(state){ var d=$('dot'); d.className='dot '+state;
    $('dotTxt').textContent = state==='on'?'PC online':(state==='off'?'PC offline':'conectando…'); }
  function startRpc(){
    if (!secret) { setDot('off'); return; }
    try{
      es = new EventSource(NTFY + '/rotina-' + secret + '-resp/sse');
      es.onmessage = function(ev){
        try{ var d = JSON.parse(ev.data); if (d.event!=='message' || !d.message) return;
          var r = JSON.parse(d.message); var p = pending[r.reqId];
          if (p){ delete pending[r.reqId]; clearTimeout(p.t); online=true; setDot('on'); p.resolve(r); }
        }catch(e){}
      };
      es.onerror = function(){ setDot(online?'on':'off'); };
    }catch(e){ setDot('off'); }
  }
  function rpc(acao, args){
    return new Promise(function(resolve, reject){
      if (!secret){ reject(new Error('Sem código (aba Config)')); return; }
      var reqId = 'r'+Date.now()+Math.floor(Math.random()*1000);
      pending[reqId] = { resolve:resolve, t:setTimeout(function(){ delete pending[reqId]; setDot(online?'on':'off'); reject(new Error('PC não respondeu (offline?)')); }, 6000) };
      fetch(NTFY + '/rotina-' + secret + '-cmd', { method:'POST', body: JSON.stringify({ reqId:reqId, acao:acao, args:args||{} }) }).catch(function(){});
    });
  }

  // ---- navegação ----
  var tabs = ['chat','alarmes','notas','config'];
  function go(tab){
    tabs.forEach(function(t){ $('pane-'+t).classList.toggle('show', t===tab); });
    document.querySelectorAll('nav button').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===tab); });
    if (tab==='alarmes') carregarAlarmes();
    if (tab==='notas') carregarNotas();
  }
  document.querySelectorAll('nav button').forEach(function(b){ b.onclick = function(){ go(b.dataset.tab); }; });

  // ---- CHAT ----
  var chatList = $('chatList');
  function addMsg(texto, who){ var d=document.createElement('div'); d.className='msg '+who; d.textContent=texto; chatList.appendChild(d); chatList.scrollTop=chatList.scrollHeight; }
  function histSave(){ try{ var msgs=[]; chatList.querySelectorAll('.msg').forEach(function(m){ msgs.push({t:m.textContent,w:m.classList.contains('me')?'me':'bot'}); }); localStorage.setItem('rotina_chat', JSON.stringify(msgs.slice(-60))); }catch(e){} }
  function histLoad(){ try{ var msgs=JSON.parse(localStorage.getItem('rotina_chat')||'[]'); msgs.forEach(function(m){ addMsg(m.t,m.w); }); }catch(e){} if(!chatList.children.length) addMsg('Oi, lust. Me peça pra criar alarme, anotar, ou lembrar de algo ("cobrar cliente em 2 dias"). Posso listar seus alarmes/notas/pendências também.','bot'); }
  async function enviarChat(){
    var v = ($('chatTxt').value||'').trim(); if(!v) return;
    $('chatTxt').value=''; addMsg(v,'me'); histSave();
    try{ var r = await rpc('chat.enviar', { texto:v }); addMsg((r.data&&r.data.resposta)||'Ok.','bot'); if(r.data&&r.data.acao&&r.data.acao!=='ajuda'){ /* dado mudou */ } }
    catch(e){ addMsg('⚠️ '+e.message,'bot'); }
    histSave();
  }
  $('chatSend').onclick = enviarChat;
  $('chatTxt').addEventListener('keydown', function(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviarChat(); } });

  // ---- ALARMES ----
  var ICONES = ['notes','dumbbell','shower','coffee','meal','shake','apple','sleep'];
  async function carregarAlarmes(){
    var box=$('alList'); box.innerHTML='<div class="muted">carregando…</div>';
    try{ var r=await rpc('alarmes.listar'); var a=r.data||[];
      if(!a.length){ box.innerHTML='<div class="muted">Nenhum alarme. Adicione acima.</div>'; return; }
      box.innerHTML='';
      a.forEach(function(t){
        var row=document.createElement('div'); row.className='row';
        row.innerHTML='<span class="time">'+t.horario+'</span><div class="mid"><div class="t1"></div><div class="t2"></div></div>';
        row.querySelector('.t1').textContent=t.titulo; row.querySelector('.t2').textContent=t.frase||'';
        var sw=document.createElement('button'); sw.className='sw'+(t.ativo?' on':''); sw.onclick=async function(){ sw.classList.toggle('on'); try{ await rpc('alarmes.toggle',{id:t.id}); }catch(e){ sw.classList.toggle('on'); } };
        var x=document.createElement('button'); x.className='x'; x.textContent='×'; x.onclick=async function(){ row.style.opacity=.4; try{ await rpc('alarmes.remover',{id:t.id}); row.remove(); }catch(e){ row.style.opacity=1; } };
        row.appendChild(sw); row.appendChild(x); box.appendChild(row);
      });
    }catch(e){ box.innerHTML='<div class="muted">'+e.message+'</div>'; }
  }
  $('alAdd').onclick=async function(){
    var h=($('alHora').value||'').trim().replace('h',':'); var t=($('alTit').value||'').trim();
    if(!/^\d{1,2}:\d{2}$/.test(h)){ return; } if(h.length===4) h='0'+h;
    if(!t){ return; }
    try{ await rpc('alarmes.adicionar',{horario:h,titulo:t,icone:'notes',frase:''}); $('alHora').value=''; $('alTit').value=''; carregarAlarmes(); }catch(e){}
  };

  // ---- NOTAS ----
  async function carregarNotas(){
    var box=$('ntList'); box.innerHTML='<div class="muted">carregando…</div>';
    try{ var r=await rpc('notas.listar'); var n=r.data||[];
      if(!n.length){ box.innerHTML='<div class="muted">Sem anotações.</div>'; return; }
      box.innerHTML='';
      n.forEach(function(it){ var row=document.createElement('div'); row.className='row';
        var mid=document.createElement('div'); mid.className='mid'; var t1=document.createElement('div'); t1.className='t1'; t1.style.fontWeight='400'; t1.style.fontSize='14px'; t1.textContent=it.texto; mid.appendChild(t1);
        var x=document.createElement('button'); x.className='x'; x.textContent='×'; x.onclick=async function(){ row.style.opacity=.4; try{ await rpc('notas.remover',{id:it.id}); row.remove(); }catch(e){ row.style.opacity=1; } };
        row.appendChild(mid); row.appendChild(x); box.appendChild(row);
      });
    }catch(e){ box.innerHTML='<div class="muted">'+e.message+'</div>'; }
  }
  $('ntAdd').onclick=async function(){ var v=($('ntTxt').value||'').trim(); if(!v) return; try{ await rpc('notas.adicionar',{texto:v}); $('ntTxt').value=''; carregarNotas(); }catch(e){} };
  $('ntTxt').addEventListener('keydown', function(e){ if(e.key==='Enter'){ $('ntAdd').click(); } });

  // ---- CONFIG / PUSH ----
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || navigator.standalone === true;
  function setSt(m,c){ $('status').textContent=m; $('status').className='status '+(c||''); }
  if (!secret){ $('codeWrap').classList.remove('hide'); setSt('Cole o código do seu link pra liberar.','err'); }
  if (isIOS && !standalone){ $('iosHint').classList.remove('hide'); }
  $('salvar').onclick=function(){ var v=$('code').value.trim(); if(v){ localStorage.setItem('rotina_k',v); secret=v; $('codeWrap').classList.add('hide'); setSt('Código salvo.','ok'); startRpc(); } };
  function urlB64(b64){ var pad='='.repeat((4-b64.length%4)%4); var s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/'); var raw=atob(s); var o=new Uint8Array(raw.length); for(var i=0;i<raw.length;i++)o[i]=raw.charCodeAt(i); return o; }
  $('ativar').onclick=async function(){
    if(!secret){ setSt('Cole o código primeiro.','err'); $('codeWrap').classList.remove('hide'); return; }
    if(!('serviceWorker' in navigator)||!('PushManager' in window)){ setSt('Navegador sem suporte a push.','err'); return; }
    if(isIOS && !standalone){ setSt('No iPhone, adicione à Tela de Início e abra por lá.','err'); $('iosHint').classList.remove('hide'); return; }
    $('ativar').disabled=true;
    try{ setSt('Pedindo permissão…');
      var perm=await Notification.requestPermission(); if(perm!=='granted'){ setSt('Permissão negada.','err'); $('ativar').disabled=false; return; }
      var reg=await navigator.serviceWorker.register('sw.js',{scope:'./'}); await navigator.serviceWorker.ready;
      var sub=await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlB64(VAPID_PUBLIC) });
      var resp=await fetch(NTFY+'/rotina-'+secret+'-subs',{ method:'POST', body:JSON.stringify(sub) }); if(!resp.ok) throw new Error('falha '+resp.status);
      setSt('Ativado, lust ✓','ok');
    }catch(e){ setSt('Erro: '+(e.message||e),'err'); }
    $('ativar').disabled=false;
  };

  // ---- start ----
  histLoad();
  startRpc();
  // ping pra mostrar online/offline
  if (secret) rpc('ping').then(function(){ setDot('on'); }).catch(function(){ setDot('off'); });
</script>
</body>
</html>
